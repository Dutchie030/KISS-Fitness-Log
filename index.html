<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>KISS Fitness Log</title>

    <link rel="manifest"
          href="./manifest.json">

    <link rel="stylesheet"
          href="style.css">
</head>
<body>

    <div class="container">

        <!-- ==================================== -->
        <!-- HEADER -->
        <!-- ==================================== -->

       <div class="header">
    <img src="Kiss logo.png"
         alt="KISS Logo"
         class="logo">

    <h2>KISS Fitness Log</h2>

    <span class="version">Beta 1.0</span>
</div>
        

        <!-- ==================================== -->
        <!-- HOMEPAGE -->
        <!-- ==================================== -->

        <div class="card">

            <div id="homePage">

                <!-- OEFENING -->

                <label>Oefening</label>
                <select id="exercise"></select>

                <div id="exerciseMessage"></div>

                <!-- OEFENING BEHEREN -->

                <div class="exercise-buttons">

                    <button id="addExerciseBtn" title="Toevoegen">
                        ➕
                    </button>

                    <button id="renameExerciseBtn" title="Hernoemen">
                        ✏️
                    </button>

                    <button id="deleteExerciseBtn" title="Verwijderen">
                        🗑️
                    </button>

                </div>

                <div class="exercise-buttons">

                    <button id="moveUpBtn" title="Omhoog">
                        ⬆️
                    </button>

                    <button id="moveDownBtn" title="Omlaag">
                        ⬇️
                    </button>

                </div>

                <!-- KRACHT -->

                <div class="strength-row">

                    <div class="strength-field">
                        <label>Gewicht (kg)</label>
                        <input type="number" id="weight">
                    </div>

                    <div class="strength-field">
                        <label>Reps</label>
                        <input type="number" id="reps">
                    </div>

                </div>

                <!-- CARDIO -->

                <div class="cardio-row">

                    <div class="cardio-field">
                        <label for="duration">Duur</label>
                        <input id="duration" type="number">
                    </div>

                    <div class="cardio-field">
                        <label for="level">Level</label>
                        <input id="level" type="number">
                    </div>

                    <div class="cardio-field">
                        <label for="distance">Km</label>
                        <input id="distance"
                               type="number"
                               step="0.1">
                    </div>

                </div>

                <!-- ACTIEKNOPPEN -->

                <div id="saveMessage"></div>
                
                <div class="action-buttons">

                    <button id="saveBtn">
                        Opslaan
                    </button>

                    <button id="historyBtn">
                        Historie
                    </button>

                </div>

                <!-- VORIGE KEER / VANDAAG -->

<div class="card">

    <h2>Vorige keer</h2>

    <div id="lastSet">
        Geen gegevens
    </div>

    <div class="today-block">

        <h2>Vandaag</h2>

        <div id="todaySet">
            Nog geen sets
        </div>

    </div>

</div>

</div>

        <!-- ==================================== -->
        <!-- HISTORIE PAGINA -->
        <!-- ==================================== -->

        <div id="historyPage" class="card hidden">

            <button id="homeBtn">
                ← Home
            </button>

            <h2>Historie</h2>

<div class="backup-buttons">

    <button id="exportBtn">
        Backup
    </button>

    <button id="importBtn">
        Import
    </button>

</div>

<h3 id="historyExerciseName"></h3>

            <input
                type="file"
                id="importFile"
                accept=".json,application/json"
                style="display:none;">

            <!-- HISTORIE -->

            <div id="history"></div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
