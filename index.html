<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KISS Fitness Log</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>KISS Fitness Log</h1>
  
    <div class="card">
        <label>Oefening</label>
<select id="exercise"></select>

<div id="exerciseMessage"></div>

<div class="exercise-buttons">

    <button id="addExerciseBtn" title="Toevoegen">
    ➕
</button>

<button id="renameExerciseBtn" title="Hernoemen">
    ✏️
</button>

<button id="deleteExerciseBtn" title="Verwijderen">
    🗑️
</button>

</div>

<div class="exercise-buttons">

    <button id="moveUpBtn" title="Omhoog">
    ⬆️
</button>

<button id="moveDownBtn" title="Omlaag">
    ⬇️
</button>

</div>
        <div class="strength-row">

    <div class="strength-field">
        <label>Gewicht (kg)</label>
        <input type="number" id="weight">
    </div>

    <div class="strength-field">
        <label>Reps</label>
        <input type="number" id="reps">
    </div>

</div>

   <div class="cardio-row">

    <div class="cardio-field">
        <label for="duration">Duur</label>
        <input id="duration" type="number">
    </div>

    <div class="cardio-field">
        <label for="level">Level</label>
        <input id="level" type="number">
    </div>

    <div class="cardio-field">
        <label for="distance">Km</label>
        <input
            id="distance"
            type="number"
            step="0.1">
    </div>

</div>
        <button id="saveBtn">Opslaan</button>
        <div id="saveMessage"></div>
    </div>

    <div class="card">
        <h2>Vorige keer</h2>
        <div id="lastSet">Geen gegevens</div>
    </div>

    <div class="card">
        <h2>Historie</h2>
        <div id="history"></div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
