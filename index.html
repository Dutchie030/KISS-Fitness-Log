<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KISS Fitness Log</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>KISS Fitness Log</h1>
    <h4 align='center'>by Dutchie_030 v1.0</h4>
<a href="https://dutchie030.github.io/KISS-Fitness-Log/about.html">ABOUT</a>
    <div class="card">
        <label>Oefening</label>
<select id="exercise"></select>

<div id="exerciseMessage"></div>

<div class="exercise-buttons">

    <button id="addExerciseBtn">
        ➕ Toevoegen
    </button>

    <button id="renameExerciseBtn">
        ✏️ Hernoemen
    </button>

    <button id="deleteExerciseBtn">
        🗑️ Verwijderen
    </button>

</div>
        <label>Gewicht (kg)</label>
        <input type="number" id="weight">

        <label>Reps</label>
        <input type="number" id="reps">

        <label>Duur (min)</label>
        <input type="number" id="duration">

        <button id="saveBtn">Opslaan</button>
        <div id="saveMessage"></div>
    </div>

    <div class="card">
        <h2>Vorige keer</h2>
        <div id="lastSet">Geen gegevens</div>
    </div>

    <div class="card">
        <h2>Historie</h2>
        <div id="history"></div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
